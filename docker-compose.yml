version: '3.8'

services:
  # 🏛️ RZUNA POSTGRES: Local Institutional Data Store
  postgres:
    image: postgres:16-alpine
    container_name: rzuna-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rzuna
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rzuna"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🚀 RZUNA ENGINE: Real-time Orchestrator
  # To scale: docker compose up --scale rzuna-engine=N -d
  rzuna-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rzuna-engine
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/rzuna
    deploy:
      resources:
        limits:
          memory: 15G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 🏎️ Redis: Institutional Message Broker
  redis:
    image: redis:7-alpine
    container_name: rzuna-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
