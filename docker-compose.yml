version: '3.8'

services:
  rzuna-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rzuna-backend
    restart: always
    ports:
      - '3001:3001'
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 15000M
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
