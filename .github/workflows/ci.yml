name: 🛡️ The Constitutional CI

on:
  push:
    branches: [ main, ready-live-* ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: 🏛️ Institutional Grade Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: 
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install --no-audit --no-fund

      - name: "🛡️ Backend Constitutional Audit (The Guardian)"
        run: npm run guardian
        env:
          NODE_ENV: test
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_KEY: "mock-key"
          NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-key"

      - name: "⚡ The Performance (Smoke Test)"
        run: |
          if [ -f "./tests/smoke-test.js" ]; then
            sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
            echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
            sudo apt-get update
            sudo apt-get install k6
            k6 run ./tests/smoke-test.js
          else
            echo "Smoke test not found, skipping."
          fi

  frontend:
    name: 🎨 Frontend Pulse (Next.js Audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install Frontend Dependencies
        working-directory: ./web
        run: npm install --no-audit --no-fund

      - name: "🛡️ UI The Guardian (Constitutional Audit)"
        working-directory: ./web
        run: npm run guardian
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-key"

  deploy_vps:
    name: 🚀 Hetzner CCX Deployment (Backend)
    runs-on: ubuntu-latest
    needs: [audit, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 🚚 Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 178.104.10.58
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/rzuna
            git pull origin main
            docker-compose up -d --build
            docker system prune -f

  deploy_vercel:
    name: 🎨 Vercel Production Deployment (Frontend)
    runs-on: ubuntu-latest
    needs: [audit, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./web
          vercel-args: '--prod'

