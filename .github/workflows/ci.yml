name: 🛡️ The Constitutional CI

on:
  push:
    branches: [ main, pr-* ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    name: 🏛️ Institutional Grade Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: 
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🔍 Lint Check (Polisi: Cek kerapian & security)
        run: npm run lint
      - name: 🛡️ Type Check (Jaksa: Cek Type-safety TSC)
        run: npm run build
      - name: 🧪 Unit Tests (Hakim: Cek Pyramid Test)
        run: npm test
        env:
          NODE_ENV: test
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_KEY: "mock-key"
