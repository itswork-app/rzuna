name: 🛡️ The Constitutional CI

on:
  push:
    branches: [ main, feat/*, ready-live-* ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  audit:
    name: 🏛️ Institutional Monorepo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with: 
          node-version: '24'
          cache: 'pnpm'

      - name: 📦 Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: "🛡️ The Guardian Audit (Singularity V22.1)"
        run: pnpm turbo run lint test build
        env:
          NODE_ENV: test
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_KEY: "mock-key"
          NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-key"
          SOLANA_RPC_URL: "https://api.mainnet-beta.solana.com"
          USDC_TREASURY_WALLET: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
          SOL_TREASURY_WALLET: "So11111111111111111111111111111111111111112"

      - name: "⚡ The Performance (Smoke Test)"
        run: |
          if [ -f "./tests/smoke-test.js" ]; then
            sudo apt-get update
            sudo apt-get install k6
            k6 run ./tests/smoke-test.js
          else
            echo "Smoke test not found, skipping."
          fi

  deploy_vps:
    name: 🚀 Hetzner CCX Deployment (Backend)
    runs-on: ubuntu-latest
    needs: [audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 🚚 Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 178.104.10.58
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/rzuna
            git pull origin main
            ./start.sh
            docker system prune -f

  deploy_vercel:
    name: 🎨 Vercel Production Deployment (Frontend)
    runs-on: ubuntu-latest
    needs: [audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/terminal
          vercel-args: '--prod'
