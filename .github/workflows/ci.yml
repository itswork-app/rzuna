name: 🛡️ The Constitutional CI

on:
  push:
    branches: [ main, pr-* ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: 🔍 Static Analysis (Lint)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🛡️ Run ESLint
        run: npm run lint

  type-check:
    name: 🏗️ Strict Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🛡️ Run TypeScript Compiler
        run: npx tsc --noEmit

  test:
    name: 🧪 Unit & Logic Tests
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🛡️ Execute Vitest with Coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_KEY: "mock-key"

  build:
    name: 📦 Production Build Verification
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Install Dependencies
        run: npm ci
      - name: 🛡️ Execute Build
        run: npm run build
        env:
          NODE_ENV: production
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_KEY: "mock-key"
