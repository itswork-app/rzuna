name: 🛡️ The Constitutional CI

on:
  push:
    branches: [main, feat/*, ready-live-*]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  audit:
    name: 🏛️ Institutional Monorepo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: '🛡️ The Guardian Audit (Singularity V22.1)'
        run: |
          pnpm exec turbo run lint test test:coverage build --filter=@rzuna/engine --filter=@rzuna/contracts --filter=@rzuna/database --filter=@rzuna/sdk
          pnpm run test:alpha
          pnpm run test:dry-run
        env:
          NODE_ENV: test
          SUPABASE_URL: 'https://mock.supabase.co'
          SUPABASE_KEY: 'mock-key'
          NEXT_PUBLIC_SUPABASE_URL: 'https://mock.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'mock-key'
          SOLANA_RPC_URL: 'https://api.mainnet-beta.solana.com'
          USDC_TREASURY_WALLET: 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v'
          SOL_TREASURY_WALLET: 'So11111111111111111111111111111111111111112'

      - name: '⚡ The Performance (Smoke Test)'
        run: |
          if [ -f "./tests/smoke-test.js" ]; then
            # Setup k6
            curl -L https://github.com/grafana/k6/releases/download/v0.51.0/k6-v0.51.0-linux-amd64.tar.gz -o k6.tar.gz
            tar -xzf k6.tar.gz
            sudo mv k6-v0.51.0-linux-amd64/k6 /usr/bin/k6

            # Build and Start Terminal for Smoke Test
            pnpm exec turbo run build --filter=@rzuna/terminal
            pnpm exec turbo run dev --filter=@rzuna/terminal &
            
            # Wait for Institutional Health Endpoint (V22.1 Standards)
            echo "Waiting for Terminal health check..."
            timeout 60 bash -c 'until curl -sf http://localhost:3000/health; do sleep 2; done'
            
            # Run Smoke Test
            k6 run ./tests/smoke-test.js
            
            # Cleanup
            pkill -f "next-dev" || true
          else
            echo "Smoke test not found, skipping."
          fi

  deploy_vps:
    name: 🚀 Hetzner CCX Deployment (Backend)
    runs-on: ubuntu-latest
    needs: [audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 🚚 Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 178.104.10.58
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/rzuna
            git pull origin main
            ./start.sh
            docker system prune -f


